services:
  postgres:
    image: postgres:16-alpine
    container_name: car-damage-claims-postgres
    environment:
      POSTGRES_DB: car_damage_claims
      POSTGRES_USER: car_damage_claims
      POSTGRES_PASSWORD: car_damage_claims
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U car_damage_claims -d car_damage_claims"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/src/CarDamageClaims.Api/Dockerfile
    container_name: car-damage-claims-backend
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=car_damage_claims;Username=car_damage_claims;Password=car_damage_claims
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      OpenAi__ProxyUrl: ${OPENAI_PROXY_URL:-}
      Email__Host: ${SMTP_HOST:-}
      Email__Port: ${SMTP_PORT:-587}
      Email__Username: ${SMTP_USERNAME:-}
      Email__Password: ${SMTP_PASSWORD:-}
      Email__FromName: ${SMTP_FROM_NAME:-Car Damage Claims AI}
      Email__FromEmail: ${SMTP_FROM_EMAIL:-}
    ports:
      - "5000:8080"
    volumes:
      - backend-storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    container_name: car-damage-claims-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres-data:
  backend-storage:
